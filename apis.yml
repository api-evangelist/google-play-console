aid: google-play-console
name: Google Play Console Developer Reporting
description: >-
  The Google Play Developer Reporting API provides programmatic access to Play
  Console data for app performance metrics, error reports, and quality insights.
  It enables developers to build automated workflows and integrate Play Console
  analytics into internal business reporting and analysis systems.
